<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ^anyi^ ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to top, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* 🌙 LUNA */
.moon {
    position: absolute;
    width: 110px;
    height: 110px;
    background: #f5f3ce;
    border-radius: 50%;
    top: 30px;
    right: 30px;
    box-shadow: 0 0 40px #f5f3ce;
}

/* ✨ ESTRELLAS */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.3; }
    to { opacity: 1; }
}

/* 💌 CARTA */
.card {
    width: 340px;
    height: 210px;
    position: relative;
    cursor: pointer;
    z-index: 2;
}

.envelope {
    width: 100%;
    height: 100%;
    background: #1c1c2b;
    border-radius: 14px;
}

.flap {
    position: absolute;
    width: 100%;
    height: 110px;
    background: #2a2a40;
    top: 0;
    clip-path: polygon(0 0, 50% 100%, 100% 0);
    transform-origin: top;
    transition: 0.8s;
}

/* 📜 CARTA */
.letter {
    position: absolute;
    width: 92%;
    max-height: 60vh;
    background: white;
    bottom: 4%;
    left: 4%;
    border-radius: 14px;
    padding: 15px;
    box-sizing: border-box;
    overflow-y: auto;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.8s;
}

.name {
    text-align: center;
    font-weight: bold;
    margin-bottom: 10px;
}

.text {
    font-size: 14px;
    white-space: pre-line;
}

/* ABRIR */
.open .flap {
    transform: rotateX(180deg);
}

.open .letter {
    opacity: 1;
    transform: translateY(0);
}

/* ❤️ LLUVIA */
.heart {
    position: absolute;
    top: -20px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}

/* 🔊 BOTÓN */
#soundBtn {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 10px 20px;
    border-radius: 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="moon"></div>

<button id="soundBtn">🔊 Activar sonido</button>

<div class="card" onclick="openCard(this)">
    <div class="envelope"></div>
    <div class="flap"></div>

    <div class="letter">
        <div class="name">Para ^anyi^ 🤍</div>
        <p class="text" id="message"></p>
    </div>
</div>

<audio id="music" loop>
    <source src="musica.mp3" type="audio/mp3">
</audio>

<script>
// ⭐ estrellas
for(let i=0;i<70;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.top=Math.random()*100+"vh";
    star.style.left=Math.random()*100+"vw";
    document.body.appendChild(star);
}

// ❤️ corazones
function createHeart(){
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = ["💖","💞","💕"][Math.floor(Math.random()*3)];
    heart.style.left = Math.random()*100+"vw";
    heart.style.fontSize = (Math.random()*20+10)+"px";
    heart.style.animationDuration = (Math.random()*3+3)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart, 300);

// 🔊 sonido
document.getElementById("soundBtn").onclick = () => {
    document.getElementById("music").play();
};

// 💬 MENSAJE COMPLETO
const text = `Mi cachetoncita💞… tal vez te preguntes por qué te escribo esto por aki y no por chat. No es por vergüenza ni nada así, sino porque quizá prefieres que nuestras conversaciones no sean tan “amorosas” 😅 por aquí, y lo entiendo. Pero aun así, necesitaba decirte todo esto 😊.

Te amo muchísimo 🥺. De verdad, no tienes idea de lo feliz que me haces🥰. Cada día despierto con una sonrisa solo por ver un mensaje tuyo. No sé si tú lo sientes igual, pero yo te admiro bastante. Te has convertido en una de mis mayores motivaciones🤗; gracias a ti, ahora hago mis cosas con más ganas, con más ilusión.

Como te dije, mi corazón te lleva desde hace mucho tiempo🫶🏻. Desde muy pequeña fuiste alguien muy importante para mí 💖🫂, y eso jamás lo voy a olvidar. Hubo momentos en los que me decepcioné de muchas personas a mi alrededor, te lo conté… pero ahora, por ti, quiero salir adelante. Gracias a ti volví a llenarme de alegría😸, aunque suene raro, es como si algo dentro de mí me diera fuerzas. Ya no me siento tan agobiado ni estresado.

Gracias por dejarme caminar a tu lado 🫶🏻. Nunca dudes de mí, porque lo único que quiero es una relación en la que tú seas muy feliz💖. Verte sonreír me llena el corazón de una forma que no puedo explicar… eres alguien demasiado especial para mí.💞

También quiero ser un apoyo para ti. Siempre estaré para lo que necesites, de verdad, sin miedo, pídeme lo que sea. A mí me haría sentir bien poder ayudarte. Y si hay momentos en los que te sientas mal o rara, por favor no te guardes nada. Yo tampoco lo haré. Quiero que seamos compañeros de vida, que podamos contarnos todo, sin miedo.

Mi corazón se siente cada vez más alegre contigo🩶, y espero poder demostrártelo día a día. Mi sueño, sinceramente, sería poder compartir toda una vida contigo. Desde que te vi, me llamaste mucho la atención: tus ojitos, tus cachetitos, tu forma de ser… todo en ti me hizo sentir algo diferente.

Nunca dudes de ti misma. Eres única, no hay nadie como tú. Tienes una forma de ser tan especial, tan reservada y tan valiosa, que te hace destacar de verdad. Te admiro mucho por eso.❣️

Tal vez no te guste cuando digo que “me puede pasar algo”, pero es un pensamiento que a veces tengo… nadie está libre de nada. Y si algún día pasa, lo único que desearía es saber que en mi camino, la persona que estuvo a mi lado se sintió tan feliz como yo contigo.💖

Sé que es mucho lo que digo, y quizás te lo vuelva a repetir más adelante, porque nunca quiero que dudes que conmigo tendrás a alguien que siempre dará todo por ti, mientras esté en esta vida.💓

Te amo 💗… no lo olvides .... mi cachetona🌹`;

let i = 0;
function typeWriter(){
    if(i < text.length){
        document.getElementById("message").innerHTML += text[i];
        i++;
        setTimeout(typeWriter, 18);
    }
}

function openCard(card){
    card.classList.toggle("open");
    if(card.classList.contains("open")){
        typeWriter();
    }
}
</script>

</body>
</html>
